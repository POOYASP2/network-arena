<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <title>Network & Cloud Systems Quiz</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --primary: #1f4ed8;
        --primary-dark: #153aa5;
        --danger: #b91c1c;
        --danger-bg: #fee2e2;
        --success: #047857;
        --success-bg: #d1fae5;
        --warn: #92400e;
        --warn-bg: #fef3c7;
        --soft: #eef2ff;
        --shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        background: linear-gradient(135deg, #111827, #1e3a8a);
        color: white;
        padding: 34px 22px 30px;
      }

      .header-inner,
      main {
        max-width: 1180px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.05;
      }

      .subtitle {
        color: #cbd5e1;
        max-width: 850px;
        margin: 0;
        line-height: 1.55;
      }

      main {
        padding: 22px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        margin-bottom: 18px;
      }

      .nav-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .mode-card {
        border: 1px solid var(--line);
        background: white;
        border-radius: 14px;
        padding: 18px;
        cursor: pointer;
        text-align: left;
        transition: 0.15s ease;
        min-height: 138px;
        color: black;
      }

      .mode-card:hover,
      .mode-card.active {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(31, 78, 216, 0.12);
        transform: translateY(-1px);
        color: white;
      }
      .mode-card.active {
        background: #c8d4f7;
        color: black;
      }

      .mode-card h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .mode-card p {
        color: var(--muted);
        margin: 0;
        line-height: 1.45;
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label,
      .field-label {
        font-weight: 700;
        font-size: 13px;
        color: #374151;
      }

      select,
      input[type='number'],
      input[type='search'] {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 15px;
        background: white;
        color: var(--text);
      }

      .checkbox-row {
        display: flex;
        gap: 10px;
        align-items: center;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fafafa;
      }

      input[type='checkbox'] {
        width: 18px;
        height: 18px;
      }

      button {

        border-radius: 10px;
        background: var(--primary);
        color: white;
        padding: 11px 15px;
        font-weight: 800;
        cursor: pointer;
        font-size: 15px;
      }

      button:hover {
        background: var(--primary-dark);
      }
      button.secondary {
        background: #374151;
      }
      button.secondary:hover {
        background: #1f2937;
      }
      button.ghost {
        background: white;
        color: var(--text);
        border: 1px solid #d1d5db;
      }
      button.ghost:hover {
        background: #f9fafb;
      }
      button.danger {
        background: var(--danger);
      }
      button.danger:hover {
        background: #991b1b;
      }
      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .span-2 {
        grid-column: span 2;
      }
      .span-3 {
        grid-column: span 3;
      }
      .span-4 {
        grid-column: span 4;
      }
      .span-5 {
        grid-column: span 5;
      }
      .span-6 {
        grid-column: span 6;
      }
      .span-7 {
        grid-column: span 7;
      }
      .span-8 {
        grid-column: span 8;
      }
      .span-12 {
        grid-column: span 12;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .pill {
        border-radius: 999px;
        padding: 7px 10px;
        background: #f3f4f6;
        color: #374151;
        font-size: 13px;
        font-weight: 700;
      }

      .pill.warn {
        background: var(--warn-bg);
        color: var(--warn);
      }
      .pill.good {
        background: var(--success-bg);
        color: var(--success);
      }
      .pill.bad {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .question-card {

        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 14px;
      }

      .question-top {

        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 10px;
      }

      .question-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .question-text {
        font-size: 17px;
        line-height: 1.5;
        font-weight: 700;
        white-space: pre-wrap;
      }

      .options {
        display: grid;
        gap: 9px;
        margin-top: 14px;
      }

      .option {
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 12px 12px;
        display: flex;
        gap: 10px;
        align-items: flex-start;
        cursor: pointer;
        background: #fff;
        line-height: 1.35;
      }

      .option:hover {
        background: #f9fafb;
      }
      .option input {
        margin-top: 2px;
      }
      .option.correct {
        border-color: var(--success);
        background: var(--success-bg);
      }
      .option.wrong {
        border-color: var(--danger);
        background: var(--danger-bg);
      }
      .option.disabled {
        cursor: default;
      }

      .feedback {
        border-radius: 12px;
        padding: 12px;
        margin-top: 14px;
        font-weight: 700;
        line-height: 1.4;
      }
      .feedback.good {
        background: var(--success-bg);
        color: var(--success);
      }
      .feedback.bad {
        background: var(--danger-bg);
        color: var(--danger);
      }
      .feedback.warn {
        background: var(--warn-bg);
        color: var(--warn);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
        align-items: center;
      }

      .bookmark-btn {
        background: white;
        color: #111827;
        border: 1px solid #d1d5db;
        padding: 8px 10px;
        white-space: nowrap;
      }
      .bookmark-btn.active {
        background: #fef3c7;
        border-color: #f59e0b;
        color: #92400e;
      }

      .empty {
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        background: #f8fafc;
        padding: 24px;
        color: var(--muted);
        text-align: center;
        line-height: 1.55;
      }

      .score-box {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .score-item {
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .score-item strong {
        display: block;
        font-size: 24px;
      }
      .score-item span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .small-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        margin-top: 8px;
      }

      .loading,
      .error {
        padding: 20px;
        border-radius: 14px;
        background: white;
        border: 1px solid var(--line);
      }
      .error {
        color: var(--danger);
        background: var(--danger-bg);
      }

      .topic-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 8px;
      }

      .topic-option {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 11px;
        background: #fafafa;
        cursor: pointer;
        min-height: 58px;
      }

      .topic-option:hover {
        border-color: var(--primary);
        background: #f8fafc;
      }

      .topic-option input {
        margin-top: 2px;
        flex: 0 0 auto;
      }

      .topic-name {
        display: block;
        font-weight: 800;
        line-height: 1.25;
      }

      .topic-count {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        margin-top: 3px;
      }

      .topic-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .topic-actions button {
        padding: 8px 10px;
        font-size: 13px;
      }

      @media (max-width: 850px) {
        .nav-grid,
        .score-box,
        .topic-grid {
          grid-template-columns: 1fr;
        }
        .toolbar {
          grid-template-columns: 1fr;
        }
        .span-2,
        .span-3,
        .span-4,
        .span-5,
        .span-6,
        .span-7,
        .span-8,
        .span-12 {
          grid-column: span 1;
        }
        .question-top {
          flex-direction: column;
        }
        header {
          padding-top: 26px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>Network & Cloud Systems Quiz</h1>
        <p class="subtitle">
          Three modes: real exam simulation, subject mastery, and bookmarked
          questions. Filters rebuild the question pool automatically.
        </p>
      </div>
    </header>

    <main>
      <div id="root"></div>
    </main>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <script>
      const { useEffect, useMemo, useState } = React;

        './questions_unified_answered_deduplicated.json',

          .replace(/\s+/g, ' ')

          normalizeText(value)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/(^-|-$)/g, '') || 'unknown'

      }
      function getSectionName(q) {
        return normalizeText(q.section || q.subject || 'Unknown / OCR review');
      }
      function getSectionId(q) {
        return normalizeText(
          q.sectionId || q.subjectId || slugify(getSectionName(q)),
        );
      }
      function isReviewQuestion(q) {
        const section = getSectionName(q).toLowerCase();
        return Boolean(
          q.reviewNeeded === true ||
          q.manualReview === true ||
          q.needsReview === true ||
          section.includes('ocr') ||
          section.includes('unknown') ||
          String(q.answerConfidence || '').toLowerCase() === 'low',
        );
      }
      function isAnswerable(q) {
        return (
          Array.isArray(q.options) &&
          q.options.length >= 2 &&
          Number.isInteger(q.answerIndex) &&
          q.answerIndex >= 0 &&
          q.answerIndex < q.options.length

      }
      function getCorrectText(q) {
        return normalizeText(
          q.answer ||
            (Array.isArray(q.options) ? q.options[q.answerIndex] : ''),
        );
      }
      function prepareQuestion(q) {
        return {
          ...q,
          _section: getSectionName(q),
          _sectionId: getSectionId(q),
          _review: isReviewQuestion(q),
          _answerable: isAnswerable(q),
          _correctText: getCorrectText(q),
        };
      }
      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      function buildPlayableQuestion(q) {
        const correctText = getCorrectText(q);
        const options = shuffle(
          q.options.map((text, originalIndex) => ({ text, originalIndex })),
        );
        const shuffledAnswerIndex = options.findIndex(
          (opt) => normalizeText(opt.text) === correctText,
        );
        return {
          ...q,
          _playOptions: options,
          _playAnswerIndex:
            shuffledAnswerIndex >= 0 ? shuffledAnswerIndex : q.answerIndex,
          _correctText: correctText,
        };
      }
      async function loadQuestionBank() {
        if (window.location.protocol === 'file:') {
          throw new Error(
            'You opened index.html with file://. Browser security blocks loading questions.json this way. Run a local server in this folder: python -m http.server 8000, then open http://localhost:8000',
          );
        }
        const errors = [];
        for (const path of DATA_PATHS) {
          try {
            const response = await fetch(path, { cache: 'no-store' });
            if (!response.ok)
              throw new Error(`${response.status} ${response.statusText}`);
            const json = await response.json();
            const questions = Array.isArray(json.questions)
              ? json.questions
              : [];
            return { json, questions: questions.map(prepareQuestion), path };
          } catch (err) {
            errors.push(`${path}: ${err.message}`);
          }
        }
        throw new Error(errors.join(' | '));
      }
      function readBookmarks() {
        try {
          const raw = localStorage.getItem(BOOKMARK_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (_a) {
          return [];
        }
      }
      function saveBookmarks(ids) {
        localStorage.setItem(BOOKMARK_KEY, JSON.stringify(ids));
      }
      function buildSections(questions) {
        const map = new Map();
        questions.forEach((q) => {
          if (!map.has(q._sectionId)) {
            map.set(q._sectionId, {
              id: q._sectionId,
              name: q._section,
              count: 0,
            });
          }
          map.get(q._sectionId).count += 1;
        });
        return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
      }
      function FilterPanel({
        excludeReview,
        setExcludeReview,
        search,
        setSearch,
        filteredCount,
        totalCount,
        answerableCount,
        reviewCount,
        dataPath,
        onFilterChangeSideEffect,
      }) {
        function handleExcludeChange(e) {
          setExcludeReview(e.target.checked);
          onFilterChangeSideEffect === null ||
          onFilterChangeSideEffect === void 0
            ? void 0
            : onFilterChangeSideEffect();
        }
        function handleSearchChange(e) {
          setSearch(e.target.value);
          onFilterChangeSideEffect === null ||
          onFilterChangeSideEffect === void 0
            ? void 0
            : onFilterChangeSideEffect();
        }
        return React.createElement(
          'section',
          { className: 'panel' },
          React.createElement(
            'div',
            { className: 'toolbar' },
            React.createElement(
              'div',
              { className: 'field span-5' },
              React.createElement('label', null, 'Search in questions/options'),
              React.createElement('input', {
                value: search,
                onChange: handleSearchChange,
                type: 'search',
                placeholder: 'Example: OSPF, IPv6, token bucket',
              }),
            ),
            React.createElement(
              'div',
              { className: 'field span-4' },
              React.createElement(
                'span',
                { className: 'field-label' },
                'Quality filter',
              ),
              React.createElement(
                'label',
                { className: 'checkbox-row' },
                React.createElement('input', {
                  type: 'checkbox',
                  checked: excludeReview,
                  onChange: handleExcludeChange,
                }),
                'Exclude manual / OCR review questions',
              ),
            ),
            React.createElement(
              'div',
              { className: 'field span-3' },
              React.createElement(
                'span',
                { className: 'field-label' },
                'Loaded from',
              ),
              React.createElement(
                'div',
                { className: 'checkbox-row', style: { fontWeight: 700 } },
                dataPath,
              ),
            ),
          ),
          React.createElement(
            'div',
            { className: 'stats' },
            React.createElement(
              'span',
              { className: 'pill' },
              'Current pool: ',
              filteredCount,
            ),
            React.createElement(
              'span',
              { className: 'pill' },
              'Total loaded: ',
              totalCount,
            ),
            React.createElement(
              'span',
              { className: 'pill good' },

              answerableCount,
            ),
            React.createElement(
              'span',

            ),
          ),
          React.createElement(
            'p',
            { className: 'small-note' },
            'In this React version, changing the checkbox/search recalculates the pool, rebuilds section counts, and clears old generated exams/practice sessions so stale questions cannot remain.',
          ),
        );
      }
      function ModeSelector({ mode, setMode, bookmarkCount }) {
        const modes = [
          {
            id: 'exam',
            title: '1) Simulate real exam',
            desc: 'Random exam, shuffled options, submit at the end, negative marking.',
          },
          {
            id: 'mastery',
            title: '2) Master one subject',
            desc: 'Choose one section, answer one by one, get the correct answer immediately.',
          },
          {
            id: 'bookmarks',
            title: `3) Bookmarked questions (${bookmarkCount})`,
            desc: 'Review questions saved in this browser. Bookmarks work across tabs.',
          },
        ];
        return React.createElement(
          'section',
          { className: 'panel' },
          React.createElement(
            'div',
            { className: 'nav-grid' },
            modes.map((item) =>
              React.createElement(
                'button',
                {

                  onClick: () => setMode(item.id),

                React.createElement('h2', null, item.title),
                React.createElement('p', null, item.desc),
              ),
            ),
          ),
        );
      }
      function BookmarkButton({ id, bookmarks, toggleBookmark }) {
        const active = bookmarks.includes(id);
        return React.createElement(
          'button',
          {
            className: `bookmark-btn ${active ? 'active' : ''}`,
            onClick: () => toggleBookmark(id),
            type: 'button',
          },
          active ? '★ Bookmarked' : '☆ Bookmark',
        );
      }
      function QuestionMeta({ q }) {
        return React.createElement(
          'div',
          { className: 'question-meta' },
          React.createElement('span', { className: 'pill' }, q._section),
          q.source &&
            React.createElement('span', { className: 'pill' }, q.source),
          q.page &&
            React.createElement('span', { className: 'pill' }, 'Page ', q.page),
          q._review &&
            React.createElement(
              'span',
              { className: 'pill warn' },

              'span',

            ),

      }
      function ExamQuestion({
        q,
        index,
        selectedIndex,
        onSelect,
        submitted,
        bookmarks,
        toggleBookmark,
      }) {

          'article',
          { className: 'question-card' },

            'div',
            { className: 'question-top' },
            React.createElement(
              'div',
              null,
              React.createElement(QuestionMeta, { q: q }),
              React.createElement(
                'div',
                { className: 'question-text' },

            ),
            React.createElement(BookmarkButton, {

          React.createElement(
            'div',

            q._playOptions.map((opt, i) => {

                { className: className, key: `${q.id}-${i}` },

            }),
          ),
          submitted &&
            selectedIndex !== undefined &&
            selectedIndex !== q._playAnswerIndex &&

              'div',
              { className: 'feedback bad' },
              'Correct answer: ',
              q._correctText,
            ),
          submitted &&
            selectedIndex === undefined &&
            React.createElement(
              'div',
              { className: 'feedback warn' },
              'Not answered. Correct answer: ',
              q._correctText,
            ),
        );
      }
      function ExamMode({
        questions,
        sections,
        bookmarks,
        toggleBookmark,
        resetSignal,
      }) {
        const [selectedSectionIds, setSelectedSectionIds] = useState([]);
        const [count, setCount] = useState(30);
        const [examQuestions, setExamQuestions] = useState([]);
        const [answers, setAnswers] = useState({});
        const [submitted, setSubmitted] = useState(false);
        const sectionSignature = useMemo(
          () => sections.map((s) => s.id).join('|'),
          [sections],

        function clearGeneratedExam() {
          setExamQuestions([]);

          setSubmitted(false);
        }
        useEffect(() => {
          setSelectedSectionIds(sections.map((s) => s.id));
          clearGeneratedExam();
        }, [resetSignal, sectionSignature]);
        const sectionCounts = useMemo(() => {
