<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network & Cloud Systems Quiz</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --primary: #1f4ed8;
        --primary-dark: #153aa5;
        --danger: #b91c1c;
        --danger-bg: #fee2e2;
        --success: #047857;
        --success-bg: #d1fae5;
        --warn: #92400e;
        --warn-bg: #fef3c7;
        --soft: #eef2ff;
        --shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        background: linear-gradient(135deg, #111827, #1e3a8a);
        color: white;
        padding: 34px 22px 30px;
      }

      .header-inner,
      main {
        max-width: 1180px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.05;
      }

      .subtitle {
        color: #cbd5e1;
        max-width: 850px;
        margin: 0;
        line-height: 1.55;
      }

      main {
        padding: 22px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        margin-bottom: 18px;
      }

      .nav-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .mode-card {
        border: 1px solid var(--line);
        background: white;
        border-radius: 14px;
        padding: 18px;
        cursor: pointer;
        text-align: left;
        transition: 0.15s ease;
        min-height: 138px;
        color: black;
      }

      .mode-card:hover,
      .mode-card.active {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(31, 78, 216, 0.12);
        transform: translateY(-1px);
        color: white;
      }
      .mode-card.active {
        background: #c8d4f7;
        color: black;
      }

      .mode-card h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .mode-card p {
        color: var(--muted);
        margin: 0;
        line-height: 1.45;
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label,
      .field-label {
        font-weight: 700;
        font-size: 13px;
        color: #374151;
      }

      select,
      input[type='number'],
      input[type='search'] {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 15px;
        background: white;
        color: var(--text);
      }

      .checkbox-row {
        display: flex;
        gap: 10px;
        align-items: center;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fafafa;
      }

      input[type='checkbox'] {
        width: 18px;
        height: 18px;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: white;
        padding: 11px 15px;
        font-weight: 800;
        cursor: pointer;
        font-size: 15px;
      }

      button:hover {
        background: var(--primary-dark);
      }
      button.secondary {
        background: #374151;
      }
      button.secondary:hover {
        background: #1f2937;
      }
      button.ghost {
        background: white;
        color: var(--text);
        border: 1px solid #d1d5db;
      }
      button.ghost:hover {
        background: #f9fafb;
      }
      button.danger {
        background: var(--danger);
      }
      button.danger:hover {
        background: #991b1b;
      }
      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .span-2 {
        grid-column: span 2;
      }
      .span-3 {
        grid-column: span 3;
      }
      .span-4 {
        grid-column: span 4;
      }
      .span-5 {
        grid-column: span 5;
      }
      .span-6 {
        grid-column: span 6;
      }
      .span-7 {
        grid-column: span 7;
      }
      .span-8 {
        grid-column: span 8;
      }
      .span-12 {
        grid-column: span 12;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .pill {
        border-radius: 999px;
        padding: 7px 10px;
        background: #f3f4f6;
        color: #374151;
        font-size: 13px;
        font-weight: 700;
      }

      .pill.warn {
        background: var(--warn-bg);
        color: var(--warn);
      }
      .pill.good {
        background: var(--success-bg);
        color: var(--success);
      }
      .pill.bad {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .question-card {
        background: white;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 14px;
      }

      .question-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 10px;
      }

      .question-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .question-text {
        font-size: 17px;
        line-height: 1.5;
        font-weight: 700;
        white-space: pre-wrap;
      }

      .options {
        display: grid;
        gap: 9px;
        margin-top: 14px;
      }

      .option {
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 12px 12px;
        display: flex;
        gap: 10px;
        align-items: flex-start;
        cursor: pointer;
        background: #fff;
        line-height: 1.35;
      }

      .option:hover {
        background: #f9fafb;
      }
      .option input {
        margin-top: 2px;
      }
      .option.correct {
        border-color: var(--success);
        background: var(--success-bg);
      }
      .option.wrong {
        border-color: var(--danger);
        background: var(--danger-bg);
      }
      .option.disabled {
        cursor: default;
      }

      .feedback {
        border-radius: 12px;
        padding: 12px;
        margin-top: 14px;
        font-weight: 700;
        line-height: 1.4;
      }
      .feedback.good {
        background: var(--success-bg);
        color: var(--success);
      }
      .feedback.bad {
        background: var(--danger-bg);
        color: var(--danger);
      }
      .feedback.warn {
        background: var(--warn-bg);
        color: var(--warn);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
        align-items: center;
      }

      .bookmark-btn {
        background: white;
        color: #111827;
        border: 1px solid #d1d5db;
        padding: 8px 10px;
        white-space: nowrap;
      }
      .bookmark-btn.active {
        background: #fef3c7;
        border-color: #f59e0b;
        color: #92400e;
      }

      .empty {
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        background: #f8fafc;
        padding: 24px;
        color: var(--muted);
        text-align: center;
        line-height: 1.55;
      }

      .score-box {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .score-item {
        background: #f8fafc;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .score-item strong {
        display: block;
        font-size: 24px;
      }
      .score-item span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .small-note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        margin-top: 8px;
      }

      .loading,
      .error {
        padding: 20px;
        border-radius: 14px;
        background: white;
        border: 1px solid var(--line);
      }
      .error {
        color: var(--danger);
        background: var(--danger-bg);
      }

      .topic-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 8px;
      }

      .topic-option {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 11px;
        background: #fafafa;
        cursor: pointer;
        min-height: 58px;
      }

      .topic-option:hover {
        border-color: var(--primary);
        background: #f8fafc;
      }

      .topic-option input {
        margin-top: 2px;
        flex: 0 0 auto;
      }

      .topic-name {
        display: block;
        font-weight: 800;
        line-height: 1.25;
      }

      .topic-count {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        margin-top: 3px;
      }

      .topic-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .topic-actions button {
        padding: 8px 10px;
        font-size: 13px;
      }

      @media (max-width: 850px) {
        .nav-grid,
        .score-box,
        .topic-grid {
          grid-template-columns: 1fr;
        }
        .toolbar {
          grid-template-columns: 1fr;
        }
        .span-2,
        .span-3,
        .span-4,
        .span-5,
        .span-6,
        .span-7,
        .span-8,
        .span-12 {
          grid-column: span 1;
        }
        .question-top {
          flex-direction: column;
        }
        header {
          padding-top: 26px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>Network & Cloud Systems Quiz</h1>
        <p class="subtitle">
          Three modes: real exam simulation, subject mastery, and bookmarked
          questions. Filters rebuild the question pool automatically.
        </p>
      </div>
    </header>

    <main>
      <div id="root"></div>
    </main>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const BOOKMARK_KEY = 'ncs_bookmarked_question_ids_v1';
      const DATA_PATHS = [
        './data/questions.json',
        './questions.json',
        './questions_unified_answered_deduplicated.json',
      ];

      function normalizeText(value) {
        return String(value ?? '')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function slugify(value) {
        return (
          normalizeText(value)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/(^-|-$)/g, '') || 'unknown'
        );
      }

      function getSectionName(q) {
        return normalizeText(q.section || q.subject || 'Unknown / OCR review');
      }

      function getSectionId(q) {
        return normalizeText(
          q.sectionId || q.subjectId || slugify(getSectionName(q)),
        );
      }

      function isReviewQuestion(q) {
        const section = getSectionName(q).toLowerCase();
        return Boolean(
          q.reviewNeeded === true ||
          q.manualReview === true ||
          q.needsReview === true ||
          section.includes('ocr') ||
          section.includes('unknown') ||
          String(q.answerConfidence || '').toLowerCase() === 'low',
        );
      }

      function isAnswerable(q) {
        return (
          Array.isArray(q.options) &&
          q.options.length >= 2 &&
          Number.isInteger(q.answerIndex) &&
          q.answerIndex >= 0 &&
          q.answerIndex < q.options.length
        );
      }

      function getCorrectText(q) {
        return normalizeText(
          q.answer ||
            (Array.isArray(q.options) ? q.options[q.answerIndex] : ''),
        );
      }

      function prepareQuestion(q) {
        return {
          ...q,
          _section: getSectionName(q),
          _sectionId: getSectionId(q),
          _review: isReviewQuestion(q),
          _answerable: isAnswerable(q),
          _correctText: getCorrectText(q),
        };
      }

      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function buildPlayableQuestion(q) {
        const correctText = getCorrectText(q);
        const options = shuffle(
          q.options.map((text, originalIndex) => ({ text, originalIndex })),
        );
        const shuffledAnswerIndex = options.findIndex(
          (opt) => normalizeText(opt.text) === correctText,
        );
        return {
          ...q,
          _playOptions: options,
          _playAnswerIndex:
            shuffledAnswerIndex >= 0 ? shuffledAnswerIndex : q.answerIndex,
          _correctText: correctText,
        };
      }

      async function loadQuestionBank() {
        const errors = [];
        for (const path of DATA_PATHS) {
          try {
            const response = await fetch(path, { cache: 'no-store' });
            if (!response.ok)
              throw new Error(`${response.status} ${response.statusText}`);
            const json = await response.json();
            const questions = Array.isArray(json.questions)
              ? json.questions
              : [];
            return { json, questions: questions.map(prepareQuestion), path };
          } catch (err) {
            errors.push(`${path}: ${err.message}`);
          }
        }
        throw new Error(errors.join(' | '));
      }

      function readBookmarks() {
        try {
          const raw = localStorage.getItem(BOOKMARK_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveBookmarks(ids) {
        localStorage.setItem(BOOKMARK_KEY, JSON.stringify(ids));
      }

      function buildSections(questions) {
        const map = new Map();
        questions.forEach((q) => {
          if (!map.has(q._sectionId)) {
            map.set(q._sectionId, {
              id: q._sectionId,
              name: q._section,
              count: 0,
            });
          }
          map.get(q._sectionId).count += 1;
        });
        return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
      }

      function FilterPanel({
        excludeReview,
        setExcludeReview,
        search,
        setSearch,
        filteredCount,
        totalCount,
        answerableCount,
        reviewCount,
        dataPath,
        onFilterChangeSideEffect,
      }) {
        function handleExcludeChange(e) {
          setExcludeReview(e.target.checked);
          onFilterChangeSideEffect?.();
        }
        function handleSearchChange(e) {
          setSearch(e.target.value);
          onFilterChangeSideEffect?.();
        }
        return (
          <section className='panel'>
            <div className='toolbar'>
              <div className='field span-5'>
                <label>Search in questions/options</label>
                <input
                  value={search}
                  onChange={handleSearchChange}
                  type='search'
                  placeholder='Example: OSPF, IPv6, token bucket'
                />
              </div>
              <div className='field span-4'>
                <span className='field-label'>Quality filter</span>
                <label className='checkbox-row'>
                  <input
                    type='checkbox'
                    checked={excludeReview}
                    onChange={handleExcludeChange}
                  />
                  Exclude manual / OCR review questions
                </label>
              </div>
              <div className='field span-3'>
                <span className='field-label'>Loaded from</span>
                <div className='checkbox-row' style={{ fontWeight: 700 }}>
                  {dataPath}
                </div>
              </div>
            </div>
            <div className='stats'>
              <span className='pill'>Current pool: {filteredCount}</span>
              <span className='pill'>Total loaded: {totalCount}</span>
              <span className='pill good'>Answerable: {answerableCount}</span>
              <span className='pill warn'>Review/OCR: {reviewCount}</span>
            </div>
            <p className='small-note'>
              In this React version, changing the checkbox/search recalculates
              the pool, rebuilds section counts, and clears old generated
              exams/practice sessions so stale questions cannot remain.
            </p>
          </section>
        );
      }

      function ModeSelector({ mode, setMode, bookmarkCount }) {
        const modes = [
          {
            id: 'exam',
            title: '1) Simulate real exam',
            desc: 'Random exam, shuffled options, submit at the end, negative marking.',
          },
          {
            id: 'mastery',
            title: '2) Master one subject',
            desc: 'Choose one section, answer one by one, get the correct answer immediately.',
          },
          {
            id: 'bookmarks',
            title: `3) Bookmarked questions (${bookmarkCount})`,
            desc: 'Review questions saved in this browser. Bookmarks work across tabs.',
          },
        ];
        return (
          <section className='panel'>
            <div className='nav-grid'>
              {modes.map((item) => (
                <button
                  key={item.id}
                  className={`mode-card ${mode === item.id ? 'active' : ''}`}
                  onClick={() => setMode(item.id)}
                >
                  <h2>{item.title}</h2>
                  <p>{item.desc}</p>
                </button>
              ))}
            </div>
          </section>
        );
      }

      function BookmarkButton({ id, bookmarks, toggleBookmark }) {
        const active = bookmarks.includes(id);
        return (
          <button
            className={`bookmark-btn ${active ? 'active' : ''}`}
            onClick={() => toggleBookmark(id)}
            type='button'
          >
            {active ? '★ Bookmarked' : '☆ Bookmark'}
          </button>
        );
      }

      function QuestionMeta({ q }) {
        return (
          <div className='question-meta'>
            <span className='pill'>{q._section}</span>
            {q.source && <span className='pill'>{q.source}</span>}
            {q.page && <span className='pill'>Page {q.page}</span>}
            {q._review && <span className='pill warn'>Review/OCR</span>}
            {!q._answerable && (
              <span className='pill bad'>No verified answer</span>
            )}
          </div>
        );
      }

      function ExamQuestion({
        q,
        index,
        selectedIndex,
        onSelect,
        submitted,
        bookmarks,
        toggleBookmark,
      }) {
        return (
          <article className='question-card'>
            <div className='question-top'>
              <div>
                <QuestionMeta q={q} />
                <div className='question-text'>
                  Q{index + 1}. {q.question}
                </div>
              </div>
              <BookmarkButton
                id={q.id}
                bookmarks={bookmarks}
                toggleBookmark={toggleBookmark}
              />
            </div>
            <div className='options'>
              {q._playOptions.map((opt, i) => {
                const isCorrect = i === q._playAnswerIndex;
                const isSelected = selectedIndex === i;
                let className = 'option';
                if (submitted && isCorrect) className += ' correct';
                if (submitted && isSelected && !isCorrect)
                  className += ' wrong';
                if (submitted) className += ' disabled';
                return (
                  <label className={className} key={`${q.id}-${i}`}>
                    <input
                      type='radio'
                      name={`exam-${q.id}`}
                      checked={selectedIndex === i}
                      disabled={submitted}
                      onChange={() => onSelect(q.id, i)}
                    />
                    <span>{opt.text}</span>
                  </label>
                );
              })}
            </div>
            {submitted &&
              selectedIndex !== undefined &&
              selectedIndex !== q._playAnswerIndex && (
                <div className='feedback bad'>
                  Correct answer: {q._correctText}
                </div>
              )}
            {submitted && selectedIndex === undefined && (
              <div className='feedback warn'>
                Not answered. Correct answer: {q._correctText}
              </div>
            )}
          </article>
        );
      }

      function ExamMode({
        questions,
        sections,
        bookmarks,
        toggleBookmark,
        resetSignal,
      }) {
        const [selectedSectionIds, setSelectedSectionIds] = useState([]);
        const [count, setCount] = useState(30);
        const [examQuestions, setExamQuestions] = useState([]);
        const [answers, setAnswers] = useState({});
        const [submitted, setSubmitted] = useState(false);

        const sectionSignature = useMemo(
          () => sections.map((s) => s.id).join('|'),
          [sections],
        );

        function clearGeneratedExam() {
          setExamQuestions([]);
          setAnswers({});
          setSubmitted(false);
        }

        useEffect(() => {
          setSelectedSectionIds(sections.map((s) => s.id));
          clearGeneratedExam();
        }, [resetSignal, sectionSignature]);

        const sectionCounts = useMemo(() => {
          const counts = new Map();
          questions.forEach((q) => {
            if (!q._answerable || q.examEligible === false) return;
            counts.set(q._sectionId, (counts.get(q._sectionId) || 0) + 1);
          });
          return counts;
        }, [questions]);

        const allSectionIds = useMemo(
          () => sections.map((s) => s.id),
          [sections],
        );
        const allSelected =
          allSectionIds.length > 0 &&
          allSectionIds.every((id) => selectedSectionIds.includes(id));

        const pool = useMemo(() => {
          const selected = new Set(selectedSectionIds);
          return questions.filter(
            (q) =>
              q._answerable &&
              q.examEligible !== false &&
              selected.has(q._sectionId),
          );
        }, [questions, selectedSectionIds]);

        function buildBalancedExamSelection() {
          const target = Math.min(Number(count) || 1, pool.length);
          const groups = new Map();
          pool.forEach((q) => {
            if (!groups.has(q._sectionId)) groups.set(q._sectionId, []);
            groups.get(q._sectionId).push(q);
          });

          const sectionOrder = shuffle(
            selectedSectionIds.filter(
              (id) => (groups.get(id) || []).length > 0,
            ),
          );
          const quotas = new Map(sectionOrder.map((id) => [id, 0]));
          sectionOrder.forEach((id) => {
            groups.set(id, shuffle(groups.get(id) || []));
          });

          let remaining = target;
          let availableSectionIds = sectionOrder;

          while (remaining > 0 && availableSectionIds.length > 0) {
            const perSection = Math.floor(
              remaining / availableSectionIds.length,
            );
            let extra = remaining % availableSectionIds.length;
            let usedThisRound = 0;

            availableSectionIds = shuffle(availableSectionIds).filter((id) => {
              const alreadyTaken = quotas.get(id) || 0;
              const availableLeft =
                (groups.get(id) || []).length - alreadyTaken;
              let desired = perSection;
              if (extra > 0) {
                desired += 1;
                extra -= 1;
              }
              if (desired <= 0 || availableLeft <= 0) {
                return availableLeft > 0;
              }
              const take = Math.min(desired, availableLeft, remaining);
              quotas.set(id, alreadyTaken + take);
              remaining -= take;
              usedThisRound += take;
              return availableLeft - take > 0;
            });

            if (usedThisRound === 0) break;
          }

          const selected = [];
          sectionOrder.forEach((id) => {
            const quota = quotas.get(id) || 0;
            selected.push(...(groups.get(id) || []).slice(0, quota));
          });
          return shuffle(selected);
        }

        function generateExam() {
          const selected = buildBalancedExamSelection().map(
            buildPlayableQuestion,
          );
          setExamQuestions(selected);
          setAnswers({});
          setSubmitted(false);
        }

        function toggleSection(sectionId) {
          setSelectedSectionIds((prev) => {
            const next = prev.includes(sectionId)
              ? prev.filter((id) => id !== sectionId)
              : [...prev, sectionId];
            return next;
          });
          clearGeneratedExam();
        }

        function selectAllSections() {
          setSelectedSectionIds(allSectionIds);
          clearGeneratedExam();
        }

        function clearSections() {
          setSelectedSectionIds([]);
          clearGeneratedExam();
        }

        function selectAnswer(id, idx) {
          setAnswers((prev) => ({ ...prev, [id]: idx }));
        }

        const score = useMemo(() => {
          let correct = 0,
            wrong = 0,
            unanswered = 0;
          examQuestions.forEach((q) => {
            const selected = answers[q.id];
            if (selected === undefined) unanswered += 1;
            else if (selected === q._playAnswerIndex) correct += 1;
            else wrong += 1;
          });
          return { correct, wrong, unanswered, total: correct - wrong * 0.33 };
        }, [answers, examQuestions]);

        const generatedDistribution = useMemo(() => {
          const counts = new Map();
          examQuestions.forEach((q) => {
            counts.set(q._sectionId, (counts.get(q._sectionId) || 0) + 1);
          });
          return sections
            .filter((s) => counts.has(s.id))
            .map((s) => `${s.name}: ${counts.get(s.id)}`)
            .join(' • ');
        }, [examQuestions, sections]);

        return (
          <section className='panel'>
            <h2>Simulate real exam</h2>
            <div className='toolbar'>
              <div className='field span-8'>
                <label>Topics / sections</label>
                <div className='topic-grid'>
                  {sections.map((s) => {
                    const countForSection = sectionCounts.get(s.id) || 0;
                    return (
                      <label className='topic-option' key={s.id}>
                        <input
                          type='checkbox'
                          checked={selectedSectionIds.includes(s.id)}
                          onChange={() => toggleSection(s.id)}
                          disabled={countForSection === 0}
                        />
                        <span>
                          <span className='topic-name'>{s.name}</span>
                          <span className='topic-count'>
                            {countForSection} available questions
                          </span>
                        </span>
                      </label>
                    );
                  })}
                </div>
                <div className='topic-actions'>
                  <button
                    type='button'
                    className='ghost'
                    onClick={selectAllSections}
                    disabled={allSelected}
                  >
                    Select all topics
                  </button>
                  <button
                    type='button'
                    className='ghost'
                    onClick={clearSections}
                    disabled={selectedSectionIds.length === 0}
                  >
                    Clear topics
                  </button>
                </div>
                <p className='small-note'>
                  For Part 1, choose one or more topics. The exam will be
                  balanced as evenly as possible across the selected topics. If
                  one topic does not have enough questions, the rest will be
                  filled from the other selected topics.
                </p>
              </div>
              <div className='field span-2'>
                <label>Questions</label>
                <input
                  type='number'
                  min='1'
                  max={pool.length || 1}
                  value={count}
                  onChange={(e) => setCount(e.target.value)}
                />
              </div>
              <div className='field span-2'>
                <button onClick={generateExam} disabled={pool.length === 0}>
                  Generate exam
                </button>
              </div>
            </div>
            <div className='stats'>
              <span className='pill'>
                Selected topics: {selectedSectionIds.length} / {sections.length}
              </span>
              <span className='pill'>
                Available for this exam: {pool.length}
              </span>
              <span className='pill'>Generated: {examQuestions.length}</span>
              <span className='pill warn'>Score: +1 / -0.33 / 0</span>
            </div>
            {generatedDistribution && (
              <p className='small-note'>
                Generated distribution: {generatedDistribution}
              </p>
            )}

            {examQuestions.length === 0 ? (
              <div className='empty'>
                Choose one or more topics, then generate an exam. If the pool is
                empty, change the selected topics or the global filters above.
              </div>
            ) : (
              <>
                {submitted && (
                  <div className='score-box'>
                    <div className='score-item'>
                      <strong>{score.total.toFixed(2)}</strong>
                      <span>Final score</span>
                    </div>
                    <div className='score-item'>
                      <strong>{score.correct}</strong>
                      <span>Correct</span>
                    </div>
                    <div className='score-item'>
                      <strong>{score.wrong}</strong>
                      <span>Wrong</span>
                    </div>
                    <div className='score-item'>
                      <strong>{score.unanswered}</strong>
                      <span>Unanswered</span>
                    </div>
                  </div>
                )}
                <div className='actions'>
                  {!submitted && (
                    <button onClick={() => setSubmitted(true)}>
                      Submit exam
                    </button>
                  )}
                  <button className='ghost' onClick={generateExam}>
                    Regenerate
                  </button>
                </div>
                <div style={{ marginTop: 14 }}>
                  {examQuestions.map((q, i) => (
                    <ExamQuestion
                      key={q.id}
                      q={q}
                      index={i}
                      selectedIndex={answers[q.id]}
                      onSelect={selectAnswer}
                      submitted={submitted}
                      bookmarks={bookmarks}
                      toggleBookmark={toggleBookmark}
                    />
                  ))}
                </div>
              </>
            )}
          </section>
        );
      }

      function MasteryMode({
        questions,
        sections,
        bookmarks,
        toggleBookmark,
        resetSignal,
      }) {
        const [sectionId, setSectionId] = useState(sections[0]?.id || '');
        const [queue, setQueue] = useState([]);
        const [index, setIndex] = useState(0);
        const [selected, setSelected] = useState(null);
        const [answered, setAnswered] = useState(false);

        useEffect(() => {
          if (!sectionId || !sections.some((s) => s.id === sectionId)) {
            setSectionId(sections[0]?.id || '');
          }
          setQueue([]);
          setIndex(0);
          setSelected(null);
          setAnswered(false);
        }, [resetSignal, sections.map((s) => s.id).join('|')]);

        const pool = useMemo(() => {
          return questions.filter(
            (q) =>
              q._answerable &&
              q.masteryEligible !== false &&
              q._sectionId === sectionId,
          );
        }, [questions, sectionId]);

        function start() {
          setQueue(shuffle(pool).map(buildPlayableQuestion));
          setIndex(0);
          setSelected(null);
          setAnswered(false);
        }

        function changeSection(e) {
          setSectionId(e.target.value);
          setQueue([]);
          setIndex(0);
          setSelected(null);
          setAnswered(false);
        }

        function choose(i) {
          if (answered) return;
          setSelected(i);
          setAnswered(true);
        }

        function next() {
          setSelected(null);
          setAnswered(false);
          setIndex((prev) => Math.min(prev + 1, queue.length));
        }

        const current = queue[index];

        return (
          <section className='panel'>
            <h2>Master one subject</h2>
            <div className='toolbar'>
              <div className='field span-8'>
                <label>Section</label>
                <select value={sectionId} onChange={changeSection}>
                  {sections.map((s) => {
                    const c = questions.filter(
                      (q) =>
                        q._answerable &&
                        q.masteryEligible !== false &&
                        q._sectionId === s.id,
                    ).length;
                    return (
                      <option key={s.id} value={s.id}>
                        {s.name} ({c})
                      </option>
                    );
                  })}
                </select>
              </div>
              <div className='field span-4'>
                <button onClick={start} disabled={pool.length === 0}>
                  Start / reshuffle subject
                </button>
              </div>
            </div>
            <div className='stats'>
              <span className='pill'>
                Available in selected subject: {pool.length}
              </span>
              <span className='pill'>Current session: {queue.length}</span>
              {queue.length > 0 && (
                <span className='pill'>
                  Progress: {Math.min(index + 1, queue.length)} / {queue.length}
                </span>
              )}
            </div>

            {!current ? (
              <div className='empty'>
                Choose a subject and start. Every wrong answer immediately shows
                the correct answer.
              </div>
            ) : (
              <article className='question-card'>
                <div className='question-top'>
                  <div>
                    <QuestionMeta q={current} />
                    <div className='question-text'>
                      Q{index + 1}. {current.question}
                    </div>
                  </div>
                  <BookmarkButton
                    id={current.id}
                    bookmarks={bookmarks}
                    toggleBookmark={toggleBookmark}
                  />
                </div>
                <div className='options'>
                  {current._playOptions.map((opt, i) => {
                    const isCorrect = i === current._playAnswerIndex;
                    const isSelected = selected === i;
                    let className = 'option';
                    if (answered && isCorrect) className += ' correct';
                    if (answered && isSelected && !isCorrect)
                      className += ' wrong';
                    if (answered) className += ' disabled';
                    return (
                      <label className={className} key={`${current.id}-${i}`}>
                        <input
                          type='radio'
                          name={`mastery-${current.id}`}
                          checked={selected === i}
                          disabled={answered}
                          onChange={() => choose(i)}
                        />
                        <span>{opt.text}</span>
                      </label>
                    );
                  })}
                </div>
                {answered && selected === current._playAnswerIndex && (
                  <div className='feedback good'>Correct.</div>
                )}
                {answered && selected !== current._playAnswerIndex && (
                  <div className='feedback bad'>
                    Wrong. Correct answer: {current._correctText}
                  </div>
                )}
                <div className='actions'>
                  {answered && index < queue.length - 1 && (
                    <button onClick={next}>Next question</button>
                  )}
                  {answered && index >= queue.length - 1 && (
                    <button onClick={start}>Restart subject shuffled</button>
                  )}
                </div>
              </article>
            )}
          </section>
        );
      }

      function BookmarkMode({ questions, bookmarks, toggleBookmark }) {
        const bookmarkedQuestions = useMemo(() => {
          const byId = new Map(questions.map((q) => [q.id, q]));
          return bookmarks
            .map((id) => byId.get(id))
            .filter(Boolean)
            .map(buildPlayableQuestion);
        }, [questions, bookmarks]);

        const [answers, setAnswers] = useState({});

        useEffect(() => setAnswers({}), [bookmarks.join('|')]);

        if (bookmarks.length === 0) {
          return (
            <section className='panel'>
              <h2>Bookmarked questions</h2>
              <div className='empty'>
                No bookmarks yet. Use the star button in exam or mastery mode.
              </div>
            </section>
          );
        }

        return (
          <section className='panel'>
            <h2>Bookmarked questions</h2>
            <div className='stats'>
              <span className='pill'>Saved IDs: {bookmarks.length}</span>
              <span className='pill'>
                Available after current filter/search:{' '}
                {bookmarkedQuestions.length}
              </span>
            </div>
            {bookmarkedQuestions.length === 0 ? (
              <div className='empty'>
                Your bookmarks exist, but the current filter/search hides them.
                Disable the review filter or clear search.
              </div>
            ) : (
              bookmarkedQuestions.map((q, idx) => (
                <article className='question-card' key={q.id}>
                  <div className='question-top'>
                    <div>
                      <QuestionMeta q={q} />
                      <div className='question-text'>
                        Q{idx + 1}. {q.question}
                      </div>
                    </div>
                    <BookmarkButton
                      id={q.id}
                      bookmarks={bookmarks}
                      toggleBookmark={toggleBookmark}
                    />
                  </div>
                  <div className='options'>
                    {q._playOptions.map((opt, i) => {
                      const selected = answers[q.id];
                      const answered = selected !== undefined;
                      const isCorrect = i === q._playAnswerIndex;
                      const isSelected = selected === i;
                      let className = 'option';
                      if (answered && isCorrect) className += ' correct';
                      if (answered && isSelected && !isCorrect)
                        className += ' wrong';
                      if (answered) className += ' disabled';
                      return (
                        <label className={className} key={`${q.id}-${i}`}>
                          <input
                            type='radio'
                            name={`bookmark-${q.id}`}
                            checked={selected === i}
                            disabled={answered}
                            onChange={() =>
                              setAnswers((prev) => ({ ...prev, [q.id]: i }))
                            }
                          />
                          <span>{opt.text}</span>
                        </label>
                      );
                    })}
                  </div>
                  {answers[q.id] !== undefined &&
                    answers[q.id] === q._playAnswerIndex && (
                      <div className='feedback good'>Correct.</div>
                    )}
                  {answers[q.id] !== undefined &&
                    answers[q.id] !== q._playAnswerIndex && (
                      <div className='feedback bad'>
                        Wrong. Correct answer: {q._correctText}
                      </div>
                    )}
                </article>
              ))
            )}
          </section>
        );
      }

      function App() {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState('');
        const [rawQuestions, setRawQuestions] = useState([]);
        const [dataPath, setDataPath] = useState('');
        const [mode, setMode] = useState('exam');
        const [excludeReview, setExcludeReview] = useState(true);
        const [search, setSearch] = useState('');
        const [bookmarks, setBookmarks] = useState(readBookmarks);
        const [resetSignal, setResetSignal] = useState(0);

        useEffect(() => {
          loadQuestionBank()
            .then((result) => {
              setRawQuestions(result.questions);
              setDataPath(result.path);
              setLoading(false);
            })
            .catch((err) => {
              setError(err.message);
              setLoading(false);
            });
        }, []);

        function forceResetGeneratedPools() {
          setResetSignal((prev) => prev + 1);
        }

        const filteredQuestions = useMemo(() => {
          const term = normalizeText(search).toLowerCase();
          return rawQuestions.filter((q) => {
            if (excludeReview && q._review) return false;
            if (!term) return true;
            const haystack = [q.question, q._section, ...(q.options || [])]
              .map(normalizeText)
              .join(' ')
              .toLowerCase();
            return haystack.includes(term);
          });
        }, [rawQuestions, excludeReview, search]);

        const answerableFiltered = useMemo(
          () => filteredQuestions.filter(isAnswerable),
          [filteredQuestions],
        );
        const sections = useMemo(
          () => buildSections(answerableFiltered),
          [answerableFiltered],
        );
        const reviewCount = useMemo(
          () => rawQuestions.filter((q) => q._review).length,
          [rawQuestions],
        );

        function toggleBookmark(id) {
          setBookmarks((prev) => {
            const next = prev.includes(id)
              ? prev.filter((x) => x !== id)
              : [...prev, id];
            saveBookmarks(next);
            return next;
          });
        }

        if (loading)
          return <div className='loading'>Loading question bank...</div>;
        if (error)
          return (
            <div className='error'>
              <strong>Could not load questions.</strong>
              <br />
              {error}
              <br />
              <br />
              Make sure the file exists at <code>data/questions.json</code>.
            </div>
          );

        return (
          <>
            <ModeSelector
              mode={mode}
              setMode={setMode}
              bookmarkCount={bookmarks.length}
            />
            <FilterPanel
              excludeReview={excludeReview}
              setExcludeReview={setExcludeReview}
              search={search}
              setSearch={setSearch}
              filteredCount={filteredQuestions.length}
              totalCount={rawQuestions.length}
              answerableCount={answerableFiltered.length}
              reviewCount={reviewCount}
              dataPath={dataPath}
              onFilterChangeSideEffect={forceResetGeneratedPools}
            />
            {mode === 'exam' && (
              <ExamMode
                questions={answerableFiltered}
                sections={sections}
                bookmarks={bookmarks}
                toggleBookmark={toggleBookmark}
                resetSignal={resetSignal}
              />
            )}
            {mode === 'mastery' && (
              <MasteryMode
                questions={answerableFiltered}
                sections={sections}
                bookmarks={bookmarks}
                toggleBookmark={toggleBookmark}
                resetSignal={resetSignal}
              />
            )}
            {mode === 'bookmarks' && (
              <BookmarkMode
                questions={answerableFiltered}
                bookmarks={bookmarks}
                toggleBookmark={toggleBookmark}
              />
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
